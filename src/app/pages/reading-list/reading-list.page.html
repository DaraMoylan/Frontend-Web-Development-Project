<ion-header>
  <ion-toolbar>
    <ion-title>Reading List</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment value="all" (ionChange)="onFilterChange($event)">
      <ion-segment-button value="all">
        <ion-label>All</ion-label>
      </ion-segment-button>
      <ion-segment-button value="to-read">
        <ion-label>To Read</ion-label>
      </ion-segment-button>
      <ion-segment-button value="reading">
        <ion-label>Reading</ion-label>
      </ion-segment-button>
      <ion-segment-button value="finished">
        <ion-label>Finished</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (filteredBooks.length === 0) {
    <div class="empty-state">
      <p>No books here yet.</p>
    </div>
  }

  <ion-list>
    @for (book of filteredBooks; track book.key) {
      <ion-item-sliding>
        <ion-item button (click)="viewBook(book)">
          @if (book.coverId) {
            <ion-thumbnail slot="start">
              <img [src]="bookService.getCoverUrl(book.coverId)" [alt]="book.title" />
            </ion-thumbnail>
          }
          <ion-label>
            <h2>{{ book.title }}</h2>
            <p>{{ book.author }}</p>
          </ion-label>
          <ion-select
            [(ngModel)]="book.status"
            (ionChange)="updateStatus(book)"
            (click)="$event.stopPropagation()"
            slot="end"
            interface="popover"
          >
            <ion-select-option value="to-read">To Read</ion-select-option>
            <ion-select-option value="reading">Reading</ion-select-option>
            <ion-select-option value="finished">Finished</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="removeBook(book.key)">
            Remove
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    }
  </ion-list>
</ion-content>
